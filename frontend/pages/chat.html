<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Чат</title>
    <link rel="stylesheet" href="../style.css" />
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
  </head>
  <body>
    <button id="themeToggle" class="theme-toggle">Тема</button>

    <div id="app">
      <aside id="chatList">
        <a href="server.html" class="back-link">← Серверы</a>
      </aside>

      <main id="chatWindow">
        <div id="chatHeader">
          <h2>Выберите чат</h2>
        </div>

        <div id="messagesWrapper">
          <div id="messages"></div>
        </div>

        <div id="inputArea" class="hidden">
          <input id="messageInput" type="text" placeholder="Написать сообщение..." />
          <button id="sendBtn">Отправить</button>
        </div>
      </main>
    </div>

    <script type="module" src="../js/theme.js"></script>
    <script type="module" src="../js/chat.js"></script>
  </body>
</html>
